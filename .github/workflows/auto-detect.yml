name: Auto Detect, Build & Deploy

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Quieter Node 20 deprecation warnings until artifact actions default to Node 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.detect.outputs.python }}
      node: ${{ steps.detect.outputs.node }}
      html: ${{ steps.detect.outputs.html }}
      node_deploy: ${{ steps.detect.outputs.node_deploy }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect project type
        id: detect
        env:
          NODE_DEPLOY_MODE: ${{ vars.NODE_DEPLOY_MODE }}
        run: |
          echo "python=false" >> "$GITHUB_OUTPUT"
          echo "node=false" >> "$GITHUB_OUTPUT"
          echo "html=false" >> "$GITHUB_OUTPUT"
          echo "node_deploy=" >> "$GITHUB_OUTPUT"

          if [ -f requirements.txt ] || [ -f pyproject.toml ] || [ -f Pipfile ] || [ -f setup.py ]; then
            echo "python=true" >> "$GITHUB_OUTPUT"
          fi

          if [ -f package.json ]; then
            echo "node=true" >> "$GITHUB_OUTPUT"
            if [ "$NODE_DEPLOY_MODE" = "pm2-server" ]; then
              echo "node_deploy=pm2-server" >> "$GITHUB_OUTPUT"
            elif [ "$NODE_DEPLOY_MODE" = "static" ]; then
              echo "node_deploy=static" >> "$GITHUB_OUTPUT"
            elif grep -qE '"vite"|"@vitejs/' package.json && grep -q 'vite build' package.json; then
              echo "node_deploy=static" >> "$GITHUB_OUTPUT"
            else
              echo "node_deploy=pm2-server" >> "$GITHUB_OUTPUT"
            fi
          fi

          # Static HTML: any .html in repo root, and not a Node app (Node build handles those)
          if [ ! -f package.json ] && compgen -G "*.html" > /dev/null; then
            echo "html=true" >> "$GITHUB_OUTPUT"
          fi

  # ───────────────────────────────────────────
  # PYTHON JOB
  # ───────────────────────────────────────────
  python-job:
    needs: detect
    if: needs.detect.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          elif [ -f pyproject.toml ]; then
            pip install .
          fi

      - name: Verify Python sources
        run: |
          cnt=$(find . -name "*.py" -not -path "./.git/*" -not -path "./_python_staging/*" | wc -l)
          if [ "$cnt" -gt 0 ]; then
            find . -name "*.py" -not -path "./.git/*" -not -path "./_python_staging/*" -print0 | xargs -0 -r python -m py_compile
          else
            echo "No Python files found to compile"
          fi

      - name: Run tests (if pytest configured)
        continue-on-error: true
        run: |
          if [ -f pytest.ini ] || [ -f setup.cfg ] || [ -f tox.ini ]; then
            pip install pytest -q
            pytest -q
          elif [ -f pyproject.toml ] && grep -q '\[tool.pytest' pyproject.toml 2>/dev/null; then
            pip install pytest -q
            pytest -q
          else
            echo "No pytest configuration found, skipping tests"
          fi

      - name: Stage Python artifact for deploy
        run: |
          mkdir -p _python_staging
          find . \
            \( -path ./.git -o -path ./_python_staging -o -path ./venv -o -path ./.venv \) -prune -o \
            -type d \( -name __pycache__ -o -name .pytest_cache \) -prune -o \
            \( -name "*.py" -o -name "requirements.txt" -o -name "pyproject.toml" -o -name "Pipfile" -o -name "Pipfile.lock" \) -print0 |
            while IFS= read -r -d '' f; do
              install -D "$f" "_python_staging/$f"
            done
          if [ -d templates ]; then
            rsync -a templates/ _python_staging/templates/
          fi

      - name: Upload Python artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-build
          path: _python_staging/
          if-no-files-found: warn

  # ───────────────────────────────────────────
  # NODE JOB
  # ───────────────────────────────────────────
  node-job:
    needs: detect
    if: needs.detect.outputs.node == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install
        env:
          SHARP_IGNORE_GLOBAL_LIBVIPS: "1"

      - name: Rebuild native modules (optional)
        if: needs.detect.outputs.node_deploy == 'static'
        continue-on-error: true
        run: |
          if npm ls @tailwindcss/oxide >/dev/null 2>&1; then
            npm rebuild @tailwindcss/oxide --update-binary || npm install @tailwindcss/oxide --no-save
          else
            echo "No @tailwindcss/oxide in tree, skipping rebuild"
          fi

      - name: Run production build (static sites)
        if: needs.detect.outputs.node_deploy == 'static'
        run: npm run build --if-present

      - name: Resolve build output directory
        id: outdir
        if: needs.detect.outputs.node_deploy == 'static'
        run: |
          if [ -d dist ]; then echo "dir=dist" >> "$GITHUB_OUTPUT"
          elif [ -d out ]; then echo "dir=out" >> "$GITHUB_OUTPUT"
          elif [ -d build ]; then echo "dir=build" >> "$GITHUB_OUTPUT"
          else echo "dir=." >> "$GITHUB_OUTPUT"
          fi

      - name: Upload static build artifact
        if: needs.detect.outputs.node_deploy == 'static'
        uses: actions/upload-artifact@v4
        with:
          name: node-build
          path: ${{ steps.outdir.outputs.dir }}/
          if-no-files-found: warn

      - name: Stage app source for PM2 server deploy
        if: needs.detect.outputs.node_deploy == 'pm2-server'
        run: |
          mkdir -p _node_pm2_staging
          rsync -a \
            --exclude node_modules \
            --exclude .git \
            --exclude .github \
            --exclude dist \
            --exclude out \
            --exclude build \
            --exclude .env \
            --exclude '.env.*' \
            --exclude _node_pm2_staging \
            ./ _node_pm2_staging/

      - name: Upload PM2 server artifact
        if: needs.detect.outputs.node_deploy == 'pm2-server'
        uses: actions/upload-artifact@v4
        with:
          name: node-build
          path: _node_pm2_staging/
          if-no-files-found: error

  # ───────────────────────────────────────────
  # HTML JOB
  # ───────────────────────────────────────────
  html-job:
    needs: detect
    if: needs.detect.outputs.html == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stage static site for deploy
        run: |
          mkdir -p _html_staging
          find . -maxdepth 3 -name "*.html" -not -path "./.git/*" -exec cp {} _html_staging/ \;
          for d in css js assets img images static public media fonts; do
            [ -d "$d" ] && cp -r "$d" _html_staging/ || true
          done
          ls -la _html_staging

      - name: Upload HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: html-build
          path: _html_staging/
          if-no-files-found: warn

  # ───────────────────────────────────────────
  # DEPLOY (push to main only)
  # ───────────────────────────────────────────
  deploy:
    needs: [detect, python-job, node-job, html-job]
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      (
        (needs.detect.outputs.node == 'true' && needs.node-job.result == 'success') ||
        (needs.detect.outputs.python == 'true' && needs.python-job.result == 'success') ||
        (needs.detect.outputs.html == 'true' && needs.html-job.result == 'success')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Download Node artifact
        if: needs.detect.outputs.node == 'true'
        uses: actions/download-artifact@v4
        with:
          name: node-build
          path: _artifact/

      - name: Download HTML artifact
        if: needs.detect.outputs.html == 'true' && needs.detect.outputs.node != 'true'
        uses: actions/download-artifact@v4
        with:
          name: html-build
          path: _artifact/

      - name: Download Python artifact
        if: needs.detect.outputs.python == 'true' && needs.detect.outputs.node != 'true' && needs.detect.outputs.html != 'true'
        uses: actions/download-artifact@v4
        with:
          name: python-build
          path: _artifact/

      - name: Verify files to upload
        run: |
          echo "=== Staged for SCP (_artifact/) ==="
          ls -laR _artifact/ 2>/dev/null || true

      - name: Ensure upload staging is not empty
        if: |
          needs.detect.outputs.node == 'true' || needs.detect.outputs.html == 'true' ||
          (needs.detect.outputs.python == 'true' && needs.detect.outputs.node != 'true' && needs.detect.outputs.html != 'true')
        run: |
          if [ ! -d _artifact ] || [ -z "$(ls -A _artifact 2>/dev/null)" ]; then
            echo "::error::_artifact/ is missing or empty (nothing to upload). Check build output and artifact download path."
            ls -la
            exit 1
          fi

      - name: Copy files to server (Node / HTML static)
        if: needs.detect.outputs.node == 'true' || needs.detect.outputs.html == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT != '' && secrets.SSH_PORT || '22' }}
          timeout: 2m
          command_timeout: 15m
          source: "_artifact/*"
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 1
          rm: false
          overwrite: true

      - name: Copy Python app to server
        if: needs.detect.outputs.python == 'true' && needs.detect.outputs.node != 'true' && needs.detect.outputs.html != 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT != '' && secrets.SSH_PORT || '22' }}
          timeout: 2m
          command_timeout: 15m
          source: "_artifact/*"
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 1
          rm: false
          overwrite: true

      - name: Remote commands after deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT != '' && secrets.SSH_PORT || '22' }}
          timeout: 2m
          command_timeout: 15m
          script: |
            set -e
            # Non-interactive SSH uses a minimal PATH — Node/npm/pm2 are often missing (nvm, fnm, /usr/local, etc.)
            EXTRA_PATH="${{ secrets.SSH_NODE_PATH }}"
            export PATH="${EXTRA_PATH:+$EXTRA_PATH:}/usr/local/bin:/snap/bin:/usr/bin:/bin:$HOME/.local/bin:$PATH"
            export NVM_DIR="${NVM_DIR:-$HOME/.nvm}"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            if [ -x "$HOME/.local/share/fnm/fnm" ]; then
              eval "$("$HOME/.local/share/fnm/fnm" env)"
            fi
            [ -f "$HOME/.profile" ] && . "$HOME/.profile" || true

            echo "=== Deployment ==="
            cd "${{ secrets.DEPLOY_PATH }}"
            ls -la

            if [ "${{ needs.detect.outputs.python }}" = "true" ] && [ "${{ needs.detect.outputs.node }}" != "true" ] && [ "${{ needs.detect.outputs.html }}" != "true" ]; then
              if [ -f requirements.txt ]; then
                echo "=== Python: install into project venv (PEP 668 blocks system pip on Debian/Ubuntu) ==="
                if [ ! -d venv ]; then
                  python3 -m venv venv
                fi
                ./venv/bin/python -m pip install --upgrade pip
                ./venv/bin/pip install -r requirements.txt
              else
                echo "No requirements.txt — skipping venv pip install"
              fi
              PY_SVC="${{ secrets.PYTHON_SYSTEMD_SERVICE }}"
              if [ -n "$PY_SVC" ]; then
                echo "=== Restart systemd: $PY_SVC ==="
                sudo systemctl restart "$PY_SVC"
                sudo systemctl is-active --quiet "$PY_SVC" || { echo "::error::Service $PY_SVC is not active after restart"; exit 1; }
              else
                echo "PYTHON_SYSTEMD_SERVICE secret not set — skipping systemctl restart"
              fi
            fi

            PM2_NAME="${{ secrets.PM2_APP_NAME }}"
            if [ "${{ needs.detect.outputs.node }}" = "true" ] && [ "${{ needs.detect.outputs.node_deploy }}" = "pm2-server" ]; then
              echo "=== PM2 server deploy: install dependencies on host ==="
              if ! command -v npm >/dev/null 2>&1; then
                echo "::error::npm not in PATH. On the server run: which npm — then add repo secret SSH_NODE_PATH with that directory (e.g. /home/azureuser/.nvm/versions/node/v20.0.0/bin)."
                exit 127
              fi
              npm ci --omit=dev 2>/dev/null || npm install --omit=dev --no-audit --no-fund
              if [ -z "$PM2_NAME" ]; then
                echo "::error::Set PM2_APP_NAME secret to your pm2 process name (see pm2 ls)"; exit 1
              fi
              if ! command -v pm2 >/dev/null 2>&1; then
                echo "::error::pm2 not found in PATH on server"; exit 1
              fi
              if pm2 describe "$PM2_NAME" >/dev/null 2>&1; then
                pm2 restart "$PM2_NAME"
                pm2 save || true
                echo "PM2 restarted: $PM2_NAME"
              else
                echo "::warning::PM2 app '$PM2_NAME' not found. Dependencies are installed; create the app once on the server (e.g. pm2 start app.js --name $PM2_NAME), then re-run deploy."
              fi
            fi

            if [ "${{ needs.detect.outputs.node }}" = "true" ] && [ "${{ needs.detect.outputs.node_deploy }}" = "static" ]; then
              if [ -n "$PM2_NAME" ]; then
                if command -v pm2 >/dev/null 2>&1; then
                  pm2 restart "$PM2_NAME" && pm2 save || true
                  echo "PM2 restarted (static assets): $PM2_NAME"
                else
                  echo "PM2_APP_NAME set but pm2 not in PATH"; exit 1
                fi
              else
                echo "Static deploy — PM2_APP_NAME not set, skipping PM2"
              fi
            fi

            if [ "${{ needs.detect.outputs.node }}" = "true" ] || [ "${{ needs.detect.outputs.html }}" = "true" ]; then
              sudo systemctl reload nginx || true
              echo "Nginx reload attempted (ignore if you use Apache only)"
            fi

            echo "=== Done ==="
